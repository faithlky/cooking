<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Upload a Recipe | Cooking 👩‍🍳</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="site-title">Cooking 👩‍🍳</a>
            <div class="nav-links">
                <a href="recipeindex.html">Recipe Index</a>
            </div>
        </nav>
    </header>
    <main>
        <h1>Upload a Recipe</h1>
        <input id="title" placeholder="Recipe title">
        <input id="slug" placeholder="Recipe slug (no spaces, lowercase, used for file names and URL)">
        <input id="subtitle" placeholder="Subtitle">

        <textarea id="ingredients" placeholder="Ingredients (one per line)"></textarea>

        <div id="steps"></div>

        <button id="add-step">Add step</button>
        <button id="preview-btn">Preview</button>
        <button id="download-btn">Download ZIP</button>

        <hr>

        <div id="preview"></div>

    </main>
    <script src="upload.js"></script>
</body>
</html>
